<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Monster Development</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/src/assets/css/style.css">
</head>
<body>

    <!-- ==================== 1. 头部区域 (Header) ==================== -->
    <header id="header-container" class="container pt-4 pb-3 header-section"></header>

    <!-- ==================== 2. 导航栏区域 (Navigation) ==================== -->
    <div id="navbar-container" class="container nav-container"></div>

    <!-- ==================== 3. 轮播图区域 (Carousel) ==================== -->
    <div id="carousel-container" class="container carousel-container mt-0"></div>

    <!-- ==================== 4. 主体内容区域 (Main Content - 三列) ==================== -->
    <div id="main-content-container" class="container main-content mt-4 mb-5 p-4"></div>

    <!-- ==================== 5. 底部区域 (Footer) ==================== -->
    <footer id="footer-container" class="footer-section position-relative"></footer>

    <!-- ==================== 6. 脚本引用区域 (Scripts) ==================== -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/src/assets/js/script.js"></script>
</body>
</html>
